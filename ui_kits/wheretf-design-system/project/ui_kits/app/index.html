<!doctype html>
<html data-theme="dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WhereTF · App</title>
  <link rel="icon" href="../../assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="app.css?v=4">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="AppSidebar.jsx"></script>
  <script type="text/babel" src="InsertsScreen.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;
    function App() {
      const [section, setSection] = useState(() => {
        const v = localStorage.getItem('wtf-app-section');
        return (v === 'inserts') ? v : 'inserts';
      });
      useEffect(() => { localStorage.setItem('wtf-app-section', section); }, [section]);
      return (
        <div className="app-shell">
          <AppSidebar section={section} onNavigate={setSection} />
          {section === 'inserts'
            ? <InsertsScreen />
            : <div style={{padding:'40px 60px', color:'var(--fg-2)'}}>
                <h1 style={{font:'700 28px/1.1 var(--font-sans)', color:'var(--fg)'}}>{section.replace('-',' ')}</h1>
                <p style={{marginTop:8, font:'400 14px/1.5 var(--font-sans)'}}>Not built in this kit — see Inserts for the canonical three-column layout.</p>
              </div>
          }
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
