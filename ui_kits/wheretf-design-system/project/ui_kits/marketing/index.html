<!doctype html>
<html data-theme="dark" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WhereTF · Bin there, found that.</title>
  <link rel="icon" href="../../assets/monogram.svg">
  <link rel="stylesheet" href="marketing.css">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Primitives.jsx"></script>
  <script type="text/babel" src="MarketingNav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Sections.jsx"></script>
  <script type="text/babel" src="Pricing.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [theme, setTheme] = useState(() => localStorage.getItem('wtf-theme') || 'dark');
      const [screen, setScreen] = useState('home'); // home | app
      useEffect(() => { document.documentElement.dataset.theme = theme; localStorage.setItem('wtf-theme', theme); }, [theme]);

      if (screen === 'app') {
        return (
          <div style={{padding:'80px 24px',textAlign:'center',minHeight:'100vh'}}>
            <h2 style={{font:'700 28px/1.1 var(--font-sans)'}}>You would now land in the app.</h2>
            <p style={{color:'var(--fg-2)'}}>See <code>ui_kits/app/index.html</code> for the app UI kit.</p>
            <button className="wtf-btn wtf-btn--secondary" onClick={() => setScreen('home')}>Back to site</button>
          </div>
        );
      }
      return (
        <>
          <MarketingNav onNavigate={setScreen} theme={theme} onToggleTheme={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} />
          <Hero onCta={() => setScreen('app')} />
          <HowItWorks />
          <ModulesSection />
          <Pricing onCta={() => setScreen('app')} />
          <CTA onCta={() => setScreen('app')} />
          <MarketingFooter />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
