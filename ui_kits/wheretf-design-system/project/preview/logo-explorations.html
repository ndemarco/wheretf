<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg)}
  .card{padding:20px 24px;box-sizing:border-box;display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .opt{display:flex;flex-direction:column;align-items:center;gap:10px;padding:14px 6px;border:1px solid var(--line);border-radius:12px;background:var(--surface)}
  .opt img{height:90px;width:auto;max-width:90%}
  .lbl{font:600 12px/1.2 var(--font-sans);color:var(--fg)}
  .sub{font:500 10px/1.2 var(--font-mono);color:var(--fg-3);letter-spacing:.06em;text-transform:uppercase}
  .adopted{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-wash)}
  .adopted .sub{color:var(--brand-ink)}
</style></head>
<body>
<div class="card">
  <div class="opt"><img src="../assets/logo-mark-A-binpin.svg"/><div class="lbl">Bin-pin</div><div class="sub">A · alt</div></div>
  <div class="opt"><img src="../assets/logo-mark-B-crosshair.svg"/><div class="lbl">Coordinate</div><div class="sub">B · alt</div></div>
  <div class="opt"><img src="../assets/logo-mark-C-pingrid.svg"/><div class="lbl">Pin-grid</div><div class="sub">C · alt</div></div>
  <div class="opt adopted"><img src="../assets/logo-mark-D-tag.svg"/><div class="lbl">Tag-drop</div><div class="sub">D · adopted</div></div>
</div>
</body></html>
