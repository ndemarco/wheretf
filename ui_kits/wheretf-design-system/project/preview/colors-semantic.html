<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg)}
  .card{padding:20px 24px;box-sizing:border-box}
  .title{font:600 13px/1.2 var(--font-sans);letter-spacing:.08em;text-transform:uppercase;color:var(--fg-2);margin-bottom:14px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .item{display:flex;align-items:center;gap:12px}
  .chip{width:44px;height:44px;border-radius:10px;flex:0 0 44px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.08)}
  .lbl{font:600 14px/1.2 var(--font-sans);color:var(--fg)}
  .meta{font:500 11px/1.3 var(--font-mono);color:var(--fg-3);margin-top:2px}
</style></head>
<body>
<div class="card">
  <div class="title">Semantic accents · workshop signals</div>
  <div class="grid">
    <div class="item"><div class="chip" style="background:#2f9e44"></div><div><div class="lbl">Go · Found</div><div class="meta">#2f9e44 --go</div></div></div>
    <div class="item"><div class="chip" style="background:#f4b400"></div><div><div class="lbl">Warn · Check</div><div class="meta">#f4b400 --warn</div></div></div>
    <div class="item"><div class="chip" style="background:#d6453d"></div><div><div class="lbl">Stop · Missing</div><div class="meta">#d6453d --stop</div></div></div>
    <div class="item"><div class="chip" style="background:#3a7dd6"></div><div><div class="lbl">Info · Linked</div><div class="meta">#3a7dd6 --info</div></div></div>
  </div>
</div>
</body></html>
