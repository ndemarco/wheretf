<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg)}
  .card{padding:20px 24px;box-sizing:border-box}
  .sample{display:flex;flex-direction:column;gap:10px;max-width:380px}
  .q{font:700 20px/1.25 var(--font-sans);color:var(--fg);margin:0}
  .a{font:500 14px/1.5 var(--font-sans);color:var(--fg-2);margin:0}
  .brand{color:var(--brand)}
  .code{font-family:var(--font-mono);background:var(--surface-2);color:var(--fg);padding:2px 6px;border-radius:4px;font-size:12px}
  .title{font:600 11px/1 var(--font-sans);letter-spacing:.08em;text-transform:uppercase;color:var(--fg-3);margin:0 0 4px}
</style></head>
<body>
<div class="card">
  <div class="sample">
    <p class="title">Voice · marketing</p>
    <p class="q">Bin there, <span class="brand">found that</span>.</p>
    <p class="a">Scan it. Name it. Find it. WhereTF is a deep item catalog for people who own too many small things and too few drawers.</p>
    <p class="title" style="margin-top:8px">Voice · app</p>
    <p class="a">Found it. <span class="code">MOD-A · DWR-3 · BIN-B2</span> — trust the bin.</p>
  </div>
</div>
</body></html>
