<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg)}
  .card{padding:22px 26px;box-sizing:border-box}
  .specimen{font:700 64px/1 var(--font-sans);letter-spacing:-0.02em;color:var(--fg);margin:0}
  .meta{margin-top:10px;display:flex;gap:18px;font:500 12px/1.2 var(--font-mono);color:var(--fg-3)}
  .meta span b{color:var(--fg-2);font-weight:600}
  .row{display:flex;gap:26px;align-items:baseline;margin-top:14px;flex-wrap:wrap}
  .w{font:400 24px/1 var(--font-sans);color:var(--fg)} .w b{font-weight:400}
  .w.m{font-weight:500}.w.s{font-weight:600}.w.b{font-weight:700}
  .w small{display:block;font:500 10px/1.3 var(--font-mono);color:var(--fg-3);margin-top:4px;letter-spacing:.06em;text-transform:uppercase}
</style></head>
<body>
<div class="card">
  <p class="specimen">Space Grotesk</p>
  <div class="meta"><span><b>Display · UI · Wordmark</b></span><span>Google Fonts · fallback: system-ui</span></div>
  <div class="row">
    <div class="w"><span>Aa Bb 01</span><small>Regular · 400</small></div>
    <div class="w m"><span>Aa Bb 01</span><small>Medium · 500</small></div>
    <div class="w s"><span>Aa Bb 01</span><small>Semibold · 600</small></div>
    <div class="w b"><span>Aa Bb 01</span><small>Bold · 700</small></div>
  </div>
</div>
</body></html>
