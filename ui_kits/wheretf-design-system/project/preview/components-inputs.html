<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg)}
  .card{padding:22px 26px;box-sizing:border-box;display:grid;gap:14px;grid-template-columns:1fr 1fr}
  .field{display:flex;flex-direction:column;gap:6px}
  label{font:600 11px/1.2 var(--font-sans);color:var(--fg-2);letter-spacing:.06em;text-transform:uppercase}
  input,select{font:400 14px/1.4 var(--font-sans);color:var(--fg);background:var(--surface);border:1px solid var(--line-input);border-radius:6px;padding:10px 12px;outline:none;transition:box-shadow 120ms}
  input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--focus-ring)}
  .with-icon{position:relative}
  .with-icon input{padding-left:36px}
  .with-icon svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--fg-3)}
  .hint{font:400 12px/1.3 var(--font-sans);color:var(--fg-3)}
  .code-input{font-family:var(--font-mono);letter-spacing:.02em}
</style></head>
<body>
<div class="card">
  <div class="field">
    <label>Item name</label>
    <input value="M6×30 SHCS"/>
  </div>
  <div class="field">
    <label>Location code</label>
    <input class="code-input" value="MOD-A · DWR-3 · BIN-B2"/>
  </div>
  <div class="field" style="grid-column:1/-1">
    <label>Search</label>
    <div class="with-icon">
      <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="20" cy="20" r="12"/><line x1="30" y1="30" x2="40" y2="40"/></svg>
      <input placeholder="Where the hell did I put that 0603 resistor?"/>
    </div>
    <div class="hint">Try item names, part numbers, or location codes.</div>
  </div>
</div>
</body></html>
