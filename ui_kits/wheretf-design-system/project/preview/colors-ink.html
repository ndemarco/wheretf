<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; background: var(--bg); color: var(--fg); }
  .card { padding: 20px 24px; box-sizing: border-box; }
  .row { display:flex; gap:10px; }
  .sw { flex:1; border-radius: 8px; min-height: 54px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; font: 500 11px/1.2 var(--font-mono); }
  .sw small { opacity:.85; font-weight:400; display:block; margin-top:2px; }
  .title { font: 600 13px/1.2 var(--font-sans); letter-spacing:.08em; text-transform:uppercase; color: var(--fg-2); margin-bottom:10px; }
</style>
</head>
<body>
<div class="card">
  <div class="title">Ink · warm neutrals</div>
  <div class="row">
    <div class="sw" style="background:#f7f5f2;color:#1f1c17">50<small>#f7f5f2</small></div>
    <div class="sw" style="background:#ebe7e0;color:#1f1c17">100<small>#ebe7e0</small></div>
    <div class="sw" style="background:#d4cec3;color:#1f1c17">200<small>#d4cec3</small></div>
    <div class="sw" style="background:#a8a094;color:#141210">300<small>#a8a094</small></div>
    <div class="sw" style="background:#767066;color:#fff">400<small>#767066</small></div>
    <div class="sw" style="background:#4a453d;color:#fff">500<small>#4a453d</small></div>
    <div class="sw" style="background:#2e2a24;color:#fff">600<small>#2e2a24</small></div>
    <div class="sw" style="background:#1f1c17;color:#fff">700<small>#1f1c17</small></div>
    <div class="sw" style="background:#141210;color:#fff">800<small>#141210</small></div>
    <div class="sw" style="background:#0b0a08;color:#fff">900<small>#0b0a08</small></div>
  </div>
</div>
</body>
</html>
