<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg)}
  .card{padding:22px 26px;box-sizing:border-box}
  .specimen{font:500 52px/1 var(--font-mono);letter-spacing:0;color:var(--fg);margin:0}
  .meta{margin-top:10px;display:flex;gap:18px;font:500 12px/1.2 var(--font-mono);color:var(--fg-3)}
  .meta span b{color:var(--fg-2);font-weight:600}
  .sample{margin-top:16px;display:grid;grid-template-columns:repeat(2,auto);gap:6px 28px;font:500 14px/1.4 var(--font-mono);color:var(--fg-2)}
  .sample b{color:var(--brand);font-weight:600}
  .sample .k{color:var(--fg-3)}
</style></head>
<body>
<div class="card">
  <p class="specimen">JetBrains Mono</p>
  <div class="meta"><span><b>Part numbers · Codes · SKUs</b></span><span>Tabular nums always on</span></div>
  <div class="sample">
    <span class="k">ITEM</span><span><b>M6×30 SHCS</b> · 12.9 grade</span>
    <span class="k">LOC</span><span>MOD-A · DWR-3 · BIN-B2</span>
    <span class="k">SKU</span><span>WTF-0603-R1K-001</span>
    <span class="k">QTY</span><span>147 · 0123456789</span>
  </div>
</div>
</body></html>
