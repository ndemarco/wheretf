<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background: var(--bg); color: var(--fg); }
  .card { padding: 20px 24px; box-sizing: border-box; }
  .row { display:flex; gap:10px; align-items:stretch; }
  .sw { flex:1; border-radius: 8px; min-height: 54px; display:flex; flex-direction:column; justify-content:flex-end; padding: 8px; color: #fff; font: 500 11px/1.2 var(--font-mono); }
  .sw small { opacity: 0.85; font-weight:400; display:block; margin-top:2px; }
  .title { font: 600 13px/1.2 var(--font-sans); letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-2); margin-bottom: 10px; }
</style>
</head>
<body>
<div class="card">
  <div class="title">Brand orange · #ff6600</div>
  <div class="row">
    <div class="sw" style="background:#fff4eb;color:#802d00">50<small>#fff4eb</small></div>
    <div class="sw" style="background:#ffe0c2;color:#802d00">100<small>#ffe0c2</small></div>
    <div class="sw" style="background:#ffbf85;color:#401700">200<small>#ffbf85</small></div>
    <div class="sw" style="background:#ff9947">300<small>#ff9947</small></div>
    <div class="sw" style="background:#ff7a1a">400<small>#ff7a1a</small></div>
    <div class="sw" style="background:#ff6600;outline:2px solid #141210;outline-offset:-2px">500 · brand<small>#ff6600</small></div>
    <div class="sw" style="background:#e65200">600<small>#e65200</small></div>
    <div class="sw" style="background:#b34000">700<small>#b34000</small></div>
    <div class="sw" style="background:#802d00">800<small>#802d00</small></div>
    <div class="sw" style="background:#401700">900<small>#401700</small></div>
  </div>
</div>
</body>
</html>
