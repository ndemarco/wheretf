<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg)}
  .card{padding:20px 26px;box-sizing:border-box;display:flex;gap:28px;align-items:flex-end;flex-wrap:wrap}
  .u{display:flex;flex-direction:column;align-items:center;gap:6px}
  .b{background:var(--brand);border-radius:3px;width:20px}
  .lbl{font:600 11px/1.2 var(--font-mono);color:var(--fg-2)}
  .sub{font:500 9px/1.2 var(--font-mono);color:var(--fg-3);letter-spacing:.06em;text-transform:uppercase}
  .title{font:600 13px/1.2 var(--font-sans);letter-spacing:.08em;text-transform:uppercase;color:var(--fg-2);width:100%;margin-bottom:8px}
</style></head>
<body>
<div class="card">
  <div class="title">Spacing scale · 8px base rhythm</div>
  <div class="u"><div class="b" style="height:4px"></div><div class="lbl">4</div><div class="sub">sp-1</div></div>
  <div class="u"><div class="b" style="height:8px"></div><div class="lbl">8</div><div class="sub">sp-2</div></div>
  <div class="u"><div class="b" style="height:12px"></div><div class="lbl">12</div><div class="sub">sp-3</div></div>
  <div class="u"><div class="b" style="height:16px"></div><div class="lbl">16</div><div class="sub">sp-4</div></div>
  <div class="u"><div class="b" style="height:24px"></div><div class="lbl">24</div><div class="sub">sp-5</div></div>
  <div class="u"><div class="b" style="height:32px"></div><div class="lbl">32</div><div class="sub">sp-6</div></div>
  <div class="u"><div class="b" style="height:48px"></div><div class="lbl">48</div><div class="sub">sp-7</div></div>
  <div class="u"><div class="b" style="height:64px"></div><div class="lbl">64</div><div class="sub">sp-8</div></div>
  <div class="u"><div class="b" style="height:96px"></div><div class="lbl">96</div><div class="sub">sp-9</div></div>
</div>
</body></html>
