<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--bg);color:var(--fg)}
  .card{padding:20px 24px;box-sizing:border-box;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;font:600 14px/1 var(--font-sans);border:0;cursor:pointer;transition:all 160ms var(--ease-out)}
  .primary{background:var(--brand);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.35), 0 1px 2px rgba(20,18,16,.12)}
  .primary:hover{filter:brightness(1.05)}
  .secondary{background:var(--surface);color:var(--fg);border:1px solid var(--line-strong)}
  .ghost{background:transparent;color:var(--fg);padding:10px 14px}
  .ghost:hover{background:var(--surface-2)}
  .danger{background:var(--stop);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.25)}
  .sm{padding:6px 10px;font-size:12px;border-radius:8px}
  .lg{padding:14px 20px;font-size:15px;border-radius:12px}
  .btn svg{width:16px;height:16px}
  .row-label{width:100%;font:500 10px/1 var(--font-mono);color:var(--fg-3);letter-spacing:.08em;text-transform:uppercase;margin:6px 0 2px}
</style></head>
<body>
<div class="card">
  <div class="row-label">Primary · Secondary · Ghost · Danger</div>
  <button class="btn primary">Add item <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="24" y1="12" x2="24" y2="36"/><line x1="12" y1="24" x2="36" y2="24"/></svg></button>
  <button class="btn secondary">Scan</button>
  <button class="btn ghost">Cancel</button>
  <button class="btn danger">Delete</button>
  <div class="row-label">Sizes</div>
  <button class="btn primary sm">Small</button>
  <button class="btn primary">Default</button>
  <button class="btn primary lg">Large</button>
</div>
</body></html>
