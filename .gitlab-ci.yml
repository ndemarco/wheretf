# WhereTF CI/CD pipeline.
#
# Stages:
#   lint  → eslint + tsc --noEmit
#   test  → backend (postgres service) + frontend (jsdom) in parallel
#   build → docker buildx, multi-arch, pushes to the GitLab registry
#   deploy→ manual, main branch only; hook for the homelab deploy system
#
# Runner tags: set RUNNER_TAG_DOCKER to whatever your GitLab Runner is
# tagged with (default `docker`). Override in GitLab CI/CD variables or
# in a .gitlab-ci-local.yml include if your setup differs.

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "v2-rewrite"
    - if: $CI_COMMIT_TAG

stages:
  - lint
  - test
  - build
  - deploy

variables:
  NODE_VERSION: "20"
  # Safety net — tests/setup.ts refuses to truncate any DB whose name
  # doesn't contain "test".
  POSTGRES_DB: wheretf_test
  POSTGRES_USER: wheretf
  POSTGRES_PASSWORD: wheretf
  # Postgres service accepts any auth; tests don't care.
  POSTGRES_HOST_AUTH_METHOD: trust
  # Image naming.
  APP_IMAGE: $CI_REGISTRY_IMAGE/web
  MIGRATE_IMAGE: $CI_REGISTRY_IMAGE/migrate
  CACHE_IMAGE: $CI_REGISTRY_IMAGE/cache

# ─── Shared templates ────────────────────────────────────────────────

.node-job:
  image: node:${NODE_VERSION}-alpine
  tags:
    - docker
  cache:
    key:
      files:
        - web/package-lock.json
      prefix: "npm"
    paths:
      - web/node_modules/
  before_script:
    - cd web
    - npm ci --prefer-offline --no-audit --no-fund

# ─── Lint ────────────────────────────────────────────────────────────

lint:
  extends: .node-job
  stage: lint
  script:
    - npm run lint
    - npx tsc --noEmit

# ─── Test ────────────────────────────────────────────────────────────

test:backend:
  extends: .node-job
  stage: test
  services:
    - name: postgres:16
      alias: postgres
  variables:
    DATABASE_URL: postgresql://wheretf:wheretf@postgres:5432/wheretf_test
    DATABASE_URL_TEST: postgresql://wheretf:wheretf@postgres:5432/wheretf_test
  script:
    # Wait for postgres to accept connections.
    - apk add --no-cache postgresql-client
    - until pg_isready -h postgres -U wheretf; do sleep 1; done
    # Apply schema to the test DB.
    - npm run db:migrate
    # Run backend tests (safety guard in tests/setup.ts requires 'test' in DB name).
    - npm run test:backend
  artifacts:
    when: always
    reports:
      junit: web/junit-backend.xml
    expire_in: 1 week

test:frontend:
  extends: .node-job
  stage: test
  script:
    - npm run test:frontend
  artifacts:
    when: always
    reports:
      junit: web/junit-frontend.xml
    expire_in: 1 week

# ─── Build ───────────────────────────────────────────────────────────

.buildx:
  image: docker:26
  tags:
    - docker
  services:
    - docker:26-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_BUILDKIT: "1"
  before_script:
    - docker info
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    # Install qemu + binfmt so we can emulate arm64 on an amd64 runner.
    - docker run --rm --privileged tonistiigi/binfmt --install arm64
    - docker buildx create --use --name wtf-builder --driver docker-container

build:runner:
  extends: .buildx
  stage: build
  needs:
    - lint
    - test:backend
    - test:frontend
  script:
    - |
      EXTRA_TAG=""
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        EXTRA_TAG="-t $APP_IMAGE:latest"
      fi
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --target runner \
        --cache-from type=registry,ref=$CACHE_IMAGE:runner \
        --cache-to   type=registry,ref=$CACHE_IMAGE:runner,mode=max \
        -t $APP_IMAGE:$CI_COMMIT_SHORT_SHA \
        $EXTRA_TAG \
        --push \
        ./web

build:migrator:
  extends: .buildx
  stage: build
  needs:
    - lint
    - test:backend
    - test:frontend
  script:
    - |
      EXTRA_TAG=""
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        EXTRA_TAG="-t $MIGRATE_IMAGE:latest"
      fi
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --target migrator \
        --cache-from type=registry,ref=$CACHE_IMAGE:migrator \
        --cache-to   type=registry,ref=$CACHE_IMAGE:migrator,mode=max \
        -t $MIGRATE_IMAGE:$CI_COMMIT_SHORT_SHA \
        $EXTRA_TAG \
        --push \
        ./web

# ─── Deploy ──────────────────────────────────────────────────────────

deploy:prod:
  stage: deploy
  image: alpine:3.19
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: false
  environment:
    name: production
    url: https://wheretf.demarco.home.arpa
  script:
    # TODO: replace with the actual homelab deploy hook.
    #
    # Candidates, pick one once the homelab deploy system is defined:
    #   - Ansible playbook run over SSH:
    #       apk add --no-cache ansible openssh-client
    #       ansible-playbook -i $HOMELAB_INVENTORY deploy/wheretf.yml \
    #         -e "image_tag=$CI_COMMIT_SHORT_SHA"
    #   - curl webhook:
    #       apk add --no-cache curl
    #       curl -fsSL -X POST "$DEPLOY_WEBHOOK_URL" \
    #         -H "Authorization: Bearer $DEPLOY_WEBHOOK_TOKEN" \
    #         -d "tag=$CI_COMMIT_SHORT_SHA"
    #   - Watchtower / Portainer pull:
    #       just push :latest and let the host pull on schedule
    - |
      echo "Deploy hook not yet wired up."
      echo "App image:     $APP_IMAGE:$CI_COMMIT_SHORT_SHA"
      echo "Migrate image: $MIGRATE_IMAGE:$CI_COMMIT_SHORT_SHA"
      echo "Replace this job's script once the homelab deploy system exposes a trigger."
      exit 0
