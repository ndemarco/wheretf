<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhereTF — Search Prototype v1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: 56px; background: #1e293b; border-right: 1px solid #334155;
    display: flex; flex-direction: column; align-items: center;
    padding: 12px 0; gap: 16px; flex-shrink: 0;
  }
  .sidebar-icon {
    width: 32px; height: 32px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #94a3b8; transition: all 0.15s;
  }
  .sidebar-icon:hover, .sidebar-icon.active { background: #334155; color: #ff6600; }
  .sidebar-icon svg { width: 20px; height: 20px; }

  .main-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  /* Search bar */
  .search-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; background: #1e293b;
    border-bottom: 1px solid #334155; flex-shrink: 0;
  }
  .search-input-wrap {
    flex: 1; display: flex; align-items: center;
    background: #0f172a; border: 1px solid #334155;
    border-radius: 8px; padding: 0 12px; transition: border-color 0.15s;
  }
  .search-input-wrap:focus-within { border-color: #ff6600; }
  .search-input-wrap svg { width: 16px; height: 16px; color: #64748b; flex-shrink: 0; }
  .search-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: #e2e8f0; font-size: 14px; padding: 8px; font-family: inherit;
  }
  .search-input::placeholder { color: #475569; }
  .search-count { font-size: 11px; color: #64748b; flex-shrink: 0; padding: 0 8px; }
  .search-clear {
    background: none; border: none; color: #475569; cursor: pointer;
    font-size: 16px; padding: 4px; line-height: 1; transition: color 0.15s;
  }
  .search-clear:hover { color: #ef4444; }

  .content-row { flex: 1; display: flex; min-height: 0; }

  /* Results panel */
  .results-panel {
    width: 280px; background: #1e293b; border-right: 1px solid #334155;
    overflow-y: auto; padding: 12px; flex-shrink: 0;
    display: flex; flex-direction: column;
  }
  .results-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px; padding: 0 4px;
  }
  .results-header-label {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.05em; color: #64748b; font-weight: 600;
  }
  .results-header-action {
    font-size: 11px; color: #ff6600; cursor: pointer;
    background: none; border: none; font-family: inherit;
  }
  .results-header-action:hover { opacity: 0.8; }

  .result-group { margin-bottom: 12px; }
  .result-group-header {
    font-size: 11px; font-weight: 600; color: #ff6600;
    padding: 4px 6px; margin-bottom: 2px;
  }
  .result-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 8px; border-radius: 6px;
    cursor: pointer; transition: background 0.1s; font-size: 12px;
  }
  .result-row:hover { background: #334155; }
  .result-row.focused { background: #334155; border-left: 2px solid #ff6600; }
  .result-row .result-info { flex: 1; min-width: 0; }
  .result-row .result-name {
    font-size: 13px; font-weight: 500; color: #e2e8f0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .result-row .result-name mark {
    background: #7c2d12; color: #fb923c; border-radius: 2px; padding: 0 1px;
  }
  .result-row .result-location { font-size: 11px; color: #64748b; margin-top: 1px; }
  .result-row .result-cat {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .result-row .pick-btn {
    width: 22px; height: 22px; border-radius: 4px;
    border: 1px solid #475569; background: transparent;
    color: #64748b; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; line-height: 1; transition: all 0.15s; flex-shrink: 0;
  }
  .result-row .pick-btn:hover { border-color: #ff6600; color: #ff6600; }
  .result-row .pick-btn.picked { background: #ff6600; border-color: #ff6600; color: #fff; }

  .results-empty {
    flex: 1; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 8px; color: #475569; font-size: 13px;
    text-align: center; padding: 24px;
  }
  .results-empty svg { width: 32px; height: 32px; color: #334155; }

  /* Grid pane */
  .grid-pane {
    flex: 1; padding: 24px; overflow: auto;
    display: flex; flex-direction: column; min-width: 0;
  }
  .grid-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .grid-header h1 { font-size: 18px; font-weight: 600; }
  .grid-toolbar { display: flex; gap: 8px; }
  .grid-toolbar button {
    background: #334155; border: 1px solid #475569; color: #e2e8f0;
    padding: 6px 12px; border-radius: 6px; font-size: 12px;
    cursor: pointer; transition: all 0.15s; font-family: inherit;
  }
  .grid-toolbar button:hover { border-color: #ff6600; color: #ff6600; }
  .grid-container {
    flex: 1; display: flex; align-items: flex-start; justify-content: center;
  }

  /* Detail panel — permanent */
  .detail-panel {
    width: 320px; min-width: 320px; background: #1e293b;
    border-left: 1px solid #334155; padding: 20px;
    overflow-y: auto; flex-shrink: 0; position: relative;
    display: flex; flex-direction: column;
  }
  .detail-panel h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
  .detail-field { margin-bottom: 10px; }
  .detail-field .label {
    font-size: 11px; color: #64748b; text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .detail-field .value { font-size: 13px; color: #e2e8f0; margin-top: 2px; }

  .panel-divider { height: 1px; background: #334155; margin: 12px 0; }

  /* Pick list */
  .pick-list-section { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .pick-list-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .pick-list-title { font-size: 13px; font-weight: 600; color: #ff6600; }
  .pick-list-count { font-size: 11px; color: #64748b; }
  .pick-list-body { flex: 1; overflow-y: auto; }

  .pick-group { margin-bottom: 10px; }
  .pick-group-header {
    font-size: 10px; font-weight: 600; color: #94a3b8;
    text-transform: uppercase; letter-spacing: 0.05em;
    padding: 4px 6px; margin-bottom: 2px;
    background: #0f172a; border-radius: 4px;
  }
  .pick-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; border-radius: 4px;
    font-size: 12px; margin-bottom: 2px;
    cursor: pointer; transition: background 0.1s;
  }
  .pick-item:hover { background: #334155; }
  .pick-item.active { background: #334155; border-left: 2px solid #ff6600; }
  .pick-item .pick-num {
    width: 20px; height: 20px; border-radius: 50%;
    background: #ff6600; color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; flex-shrink: 0;
  }
  .pick-item .pick-item-info { flex: 1; min-width: 0; }
  .pick-item .pick-item-name {
    font-size: 12px; color: #e2e8f0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .pick-item .pick-item-loc { font-size: 10px; color: #64748b; }
  .pick-item .pick-remove {
    background: none; border: none; color: #475569; cursor: pointer;
    font-size: 14px; padding: 2px; transition: color 0.15s;
  }
  .pick-item .pick-remove:hover { color: #ef4444; }

  .pick-actions { margin-top: 10px; display: flex; gap: 8px; }
  .pick-actions button {
    flex: 1; padding: 8px 12px; border-radius: 6px;
    font-size: 12px; cursor: pointer; font-family: inherit; transition: all 0.15s;
  }
  .btn-primary { background: #ff6600; border: none; color: #fff; }
  .btn-primary:hover { background: #e55b00; }
  .btn-secondary { background: #334155; border: 1px solid #475569; color: #e2e8f0; }
  .btn-secondary:hover { border-color: #ff6600; color: #ff6600; }

  /* Undo toast */
  .undo-toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1e293b; border: 1px solid #475569; border-radius: 8px;
    padding: 10px 16px; font-size: 13px; color: #e2e8f0;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    display: flex; align-items: center; gap: 12px;
    z-index: 200; opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .undo-toast.visible { opacity: 1; pointer-events: auto; }
  .undo-toast .undo-btn {
    background: none; border: none; color: #ff6600; cursor: pointer;
    font-size: 13px; font-weight: 600; font-family: inherit;
  }
  .undo-toast .undo-btn:hover { text-decoration: underline; }

  .pick-item .pick-qty {
    font-size: 11px; color: #ff6600; font-weight: 600;
    flex-shrink: 0; min-width: 20px; text-align: center;
  }

  /* Tooltip */
  .tooltip {
    position: fixed; background: #1e293b; border: 1px solid #475569;
    border-radius: 8px; padding: 10px 14px; font-size: 12px;
    pointer-events: none; z-index: 100;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    max-width: 240px; display: none;
  }
  .tooltip .tt-label { font-weight: 600; color: #ff6600; margin-bottom: 4px; }
  .tooltip .tt-item { color: #e2e8f0; margin-bottom: 2px; }
  .tooltip .tt-type { color: #94a3b8; font-size: 11px; }
  .tooltip .tt-params { color: #64748b; font-size: 11px; margin-top: 4px; }

  .legend {
    display: flex; gap: 16px; margin-top: 16px; font-size: 11px; color: #64748b;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch {
    width: 16px; height: 16px; border-radius: 3px; border: 1px solid #475569;
  }
</style>
</head>

<div class="sidebar">
  <div class="sidebar-icon" title="Modules">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>

<div class="undo-toast" id="undoToast">

<div class="tooltip" id="tooltip">

// === SEARCH ===
function doSearch(query) {
  if (!query || query.length < 2) {
    searchResults = [];
    document.getElementById('searchCount').textContent = '';
    renderResults();
    drawGrid();
    return;
  }
  const q = query.toLowerCase();
  searchResults = allItems.filter(it =>
    it.item.toLowerCase().includes(q) ||
    it.params.toLowerCase().includes(q) ||
    it.category.toLowerCase().includes(q)
  );
  document.getElementById('searchCount').textContent = searchResults.length + ' result' + (searchResults.length !== 1 ? 's' : '');
  renderResults();
  drawGrid();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  searchResults = [];
  document.getElementById('searchCount').textContent = '';
  renderResults();
  drawGrid();
  document.getElementById('searchInput').focus();
}

function highlightMatch(text, query) {
  if (!query || query.length < 2) return text;
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx) + '<mark>' + text.slice(idx, idx + query.length) + '</mark>' + text.slice(idx + query.length);
}

// === RESULTS ===
function renderResults() {
  const container = document.getElementById('resultsList');
  const query = document.getElementById('searchInput').value;
  if (searchResults.length === 0) {
    container.innerHTML = query.length >= 2
      ? '<div class="results-empty">No results for "' + query + '"</div>'
      : '<div class="results-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Type to search across all modules</div>';
    return;
  }

  const groups = {};
  for (const r of searchResults) {
    const key = r.module + ' / Level ' + r.level;
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  }

  let html = '';
  for (const [label, items] of Object.entries(groups)) {
    html += `<div class="result-group"><div class="result-group-header">${label} (${items.length})</div>`;
    for (const item of items) {
      const picked = pickList.find(p => p.id === item.id);
      const isFocused = focusedItemId === item.id;
      html += `
        <div class="result-row ${isFocused ? 'focused' : ''}" onclick="focusResult('${item.id}')" data-id="${item.id}"
             onmouseenter="hoverResult('${item.id}')" onmouseleave="hoverResult(null)">
          <div class="result-cat" style="background: ${categoryColors[item.category] || '#475569'}"></div>
          <div class="result-info">
            <div class="result-name">${highlightMatch(item.item, query)}</div>
            <div class="result-location">${item.module}:${item.level}:${item.pos}</div>
          </div>
          <button class="pick-btn ${picked ? 'picked' : ''}" onclick="event.stopPropagation(); addToPick('${item.id}')" title="Add to pick list${picked ? ' (qty: ' + picked.qty + ')' : ''}">
            ${picked ? picked.qty : '+'}
          </button>
        </div>`;
    }
    html += '</div>';
  }
  container.innerHTML = html;
}

// === FOCUS ===
function focusResult(id) {
  focusedItemId = id;
  const item = allItems.find(i => i.id === id);
  if (!item) return;

  // Navigate grid if not already showing this item's location
  if (currentGrid.module !== item.module || currentGrid.level !== item.level) {
    currentGrid = { module: item.module, level: item.level };
    document.getElementById('gridTitle').textContent = `${item.module} / Level ${item.level}`;
  }

  // Update detail panel
  document.getElementById('detailTitle').textContent = item.item;
  const isPicked = pickList.some(p => p.id === id);
  document.getElementById('detailContent').innerHTML = `
    <div class="detail-field"><div class="label">Location</div><div class="value">${item.module}:${item.level}:${item.pos}</div></div>
    <div class="detail-field"><div class="label">Category</div><div class="value" style="color:${categoryColors[item.category]}">${item.category}</div></div>
    <div class="detail-field"><div class="label">Parameters</div><div class="value">${item.params}</div></div>
    <div class="detail-field"><div class="label">Actions</div><div class="value" style="margin-top:8px">
      <button class="btn-secondary" style="padding:6px 12px;font-size:12px" onclick="addToPick('${item.id}')">
        ${isPicked ? 'Add Another' : 'Add to Pick List'}
      </button>
    </div></div>
  `;

  renderResults();
  renderPickList();
  drawGrid();
}

// === PICK LIST ===
function addToPick(id) {
  // + button: if already in list, increment qty. Otherwise add with qty 1.
  const existing = pickList.find(p => p.id === id);
  if (existing) {
    existing.qty++;
  } else {
    const item = allItems.find(i => i.id === id);
    if (item) pickList.push({ ...item, qty: 1 });
    sortPickList();
  }
  refreshAll();
}

function removeFromPick(id) {
  const idx = pickList.findIndex(p => p.id === id);
  if (idx < 0) return;
  lastRemoved = { ...pickList[idx], insertIdx: idx };
  pickList.splice(idx, 1);
  showUndoToast(lastRemoved.item);
  refreshAll();
}

function showUndoToast(itemName) {
  const toast = document.getElementById('undoToast');
  document.getElementById('undoMsg').textContent = 'Removed ' + (itemName.length > 24 ? itemName.slice(0, 24) + '…' : itemName);
  toast.classList.add('visible');
  if (undoTimer) clearTimeout(undoTimer);
  undoTimer = setTimeout(() => {
    toast.classList.remove('visible');
    lastRemoved = null;
  }, 4000);
}

function undoRemove() {
  if (!lastRemoved) return;
  // Re-insert at original position
  const idx = Math.min(lastRemoved.insertIdx, pickList.length);
  const { insertIdx, ...item } = lastRemoved;
  pickList.splice(idx, 0, item);
  lastRemoved = null;
  document.getElementById('undoToast').classList.remove('visible');
  if (undoTimer) clearTimeout(undoTimer);
  refreshAll();
}

function clearPickList() {
  if (pickList.length > 0) {
    lastClearedList = pickList.map(p => ({ ...p }));
    pickList = [];
  }
  refreshAll();
}

function restorePickList() {
  if (!lastClearedList) return;
  pickList = lastClearedList;
  lastClearedList = null;
  refreshAll();
}

function refreshAll() {
  renderPickList();
  renderResults();
  drawGrid();
  if (focusedItemId) {
    // Re-render detail panel button state
    const item = allItems.find(i => i.id === focusedItemId);
    if (item) {
      const isPicked = pickList.some(p => p.id === focusedItemId);
      document.getElementById('detailContent').innerHTML = `
        <div class="detail-field"><div class="label">Location</div><div class="value">${item.module}:${item.level}:${item.pos}</div></div>
        <div class="detail-field"><div class="label">Category</div><div class="value" style="color:${categoryColors[item.category]}">${item.category}</div></div>
        <div class="detail-field"><div class="label">Parameters</div><div class="value">${item.params}</div></div>
        <div class="detail-field"><div class="label">Actions</div><div class="value" style="margin-top:8px">
          <button class="btn-secondary" style="padding:6px 12px;font-size:12px" onclick="addToPick('${item.id}')">
            ${isPicked ? 'Add Another' : 'Add to Pick List'}
          </button>
        </div></div>
      `;
    }
  }
}

function sortPickList() {
  // Sort by module, then level — intelligent ordering
  pickList.sort((a, b) => {
    if (a.module !== b.module) return a.module.localeCompare(b.module);
    if (a.level !== b.level) return a.level - b.level;
    return a.pos.localeCompare(b.pos);
  });
}

function renderPickList() {
  const container = document.getElementById('pickListBody');
  const countEl = document.getElementById('pickListCount');
  const actionsEl = document.getElementById('pickActions');

  const totalQty = pickList.reduce((sum, p) => sum + p.qty, 0);
  countEl.textContent = pickList.length + ' item' + (pickList.length !== 1 ? 's' : '') + (totalQty > pickList.length ? ' (' + totalQty + ' total)' : '');

  if (pickList.length === 0) {
    container.innerHTML = '<div style="font-size:12px;color:#475569;padding:8px 0">No items yet — use + on search results</div>';
    if (lastClearedList) {
      actionsEl.style.display = 'flex';
      actionsEl.innerHTML = '<button class="btn-secondary" onclick="restorePickList()">Restore</button>';
    } else {
      actionsEl.style.display = 'none';
    }
    return;
  }
  actionsEl.style.display = 'flex';
  actionsEl.innerHTML = '<button class="btn-secondary" onclick="clearPickList()">Clear</button>';

  // Group by module, then by level within module
  const groups = [];
  let lastKey = '';
  for (let i = 0; i < pickList.length; i++) {
    const p = pickList[i];
    const key = p.module + ':' + p.level;
    if (key !== lastKey) {
      groups.push({ label: p.module + ' / Level ' + p.level, module: p.module, level: p.level, items: [] });
      lastKey = key;
    }
    groups[groups.length - 1].items.push({ ...p, globalIndex: i + 1 });
  }

  let html = '';
  for (const group of groups) {
    html += `<div class="pick-group">`;
    html += `<div class="pick-group-header">${group.label}</div>`;
    for (const item of group.items) {
      const isActive = focusedItemId === item.id;
      html += `
        <div class="pick-item ${isActive ? 'active' : ''}" onclick="pickItemClick('${item.id}')">
          <div class="pick-num">${item.globalIndex}</div>
          <div class="pick-item-info">
            <div class="pick-item-name">${item.item}</div>
            <div class="pick-item-loc">${item.pos}</div>
          </div>
          ${item.qty > 1 ? `<span class="pick-qty">×${item.qty}</span>` : ''}
          <button class="pick-remove" onclick="event.stopPropagation(); removeFromPick('${item.id}')">×</button>
        </div>`;
    }
    html += '</div>';
  }
  container.innerHTML = html;
}

function pickItemClick(id) {
  // Navigate grid to this item's location and highlight it
  const item = pickList.find(p => p.id === id);
  if (!item) return;

  focusedItemId = id;

  if (currentGrid.module !== item.module || currentGrid.level !== item.level) {
    currentGrid = { module: item.module, level: item.level };
    document.getElementById('gridTitle').textContent = `${item.module} / Level ${item.level}`;
  }

  // Update detail top
  document.getElementById('detailTitle').textContent = item.item;
  document.getElementById('detailContent').innerHTML = `
    <div class="detail-field"><div class="label">Location</div><div class="value">${item.module}:${item.level}:${item.pos}</div></div>
    <div class="detail-field"><div class="label">Category</div><div class="value" style="color:${categoryColors[item.category]}">${item.category}</div></div>
    <div class="detail-field"><div class="label">Parameters</div><div class="value">${item.params}</div></div>
  `;

  renderPickList();
  renderResults();
  drawGrid();
}

function hoverResult(id) {
  hoveredResultId = id;
  drawGrid();
}

// === GRID ===
const ROWS = 4, COLS = 6, CELL_W = 110, CELL_H = 100;
const MARGIN_LEFT = 40, MARGIN_TOP = 40, GAP = 4, RADIUS = 4;
const rowLabels = ['A','B','C','D'], colLabels = ['1','2','3','4','5','6'];

function drawGrid() {
  const svg = document.getElementById('grid');
  svg.innerHTML = '';

  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  const dp = document.createElementNS('http://www.w3.org/2000/svg', 'pattern');
  dp.setAttribute('id','disabled-hatch'); dp.setAttribute('patternUnits','userSpaceOnUse');
  dp.setAttribute('width','8'); dp.setAttribute('height','8'); dp.setAttribute('patternTransform','rotate(45)');
  const dl = document.createElementNS('http://www.w3.org/2000/svg','line');
  dl.setAttribute('x1','0'); dl.setAttribute('y1','0'); dl.setAttribute('x2','0'); dl.setAttribute('y2','8');
  dl.setAttribute('stroke','#7f1d1d'); dl.setAttribute('stroke-width','3');
  dp.appendChild(dl); defs.appendChild(dp); svg.appendChild(defs);

  const gridKey = currentGrid.module + ':' + currentGrid.level;
  const cells = gridData[gridKey] || {};

  // Build lookup: which positions are search hits, which are picked (with number)
  const searchHits = new Set();
  const pickedMap = new Map(); // pos -> global pick number
  for (const r of searchResults) {
    if (r.module === currentGrid.module && r.level === currentGrid.level) searchHits.add(r.pos);
  }
  for (let i = 0; i < pickList.length; i++) {
    const p = pickList[i];
    if (p.module === currentGrid.module && p.level === currentGrid.level) {
      pickedMap.set(p.pos, i + 1);
    }
  }

  // Focused item position on this grid
  const focusedItem = focusedItemId ? allItems.find(i => i.id === focusedItemId) : null;
  const focusedPos = (focusedItem && focusedItem.module === currentGrid.module && focusedItem.level === currentGrid.level) ? focusedItem.pos : null;

  // Hovered result position on this grid
  const hoveredItem = hoveredResultId ? allItems.find(i => i.id === hoveredResultId) : null;
  const hoveredPos = (hoveredItem && hoveredItem.module === currentGrid.module && hoveredItem.level === currentGrid.level) ? hoveredItem.pos : null;

  // Column labels
  for (let c = 0; c < COLS; c++) {
    const x = MARGIN_LEFT + c * (CELL_W + GAP) + CELL_W / 2;
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', x); t.setAttribute('y', 24);
    t.setAttribute('text-anchor', 'middle'); t.setAttribute('fill', '#64748b');
    t.setAttribute('font-size', '13'); t.setAttribute('font-family', 'inherit');
    t.textContent = colLabels[c]; svg.appendChild(t);
  }
  for (let r = 0; r < ROWS; r++) {
    const y = MARGIN_TOP + r * (CELL_H + GAP) + CELL_H / 2 + 5;
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', 16); t.setAttribute('y', y);
    t.setAttribute('text-anchor', 'middle'); t.setAttribute('fill', '#64748b');
    t.setAttribute('font-size', '13'); t.setAttribute('font-family', 'inherit');
    t.textContent = rowLabels[r]; svg.appendChild(t);
  }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const key = rowLabels[r] + colLabels[c];
      const cell = cells[key];
      if (!cell) continue;

      const x = MARGIN_LEFT + c * (CELL_W + GAP);
      const y = MARGIN_TOP + r * (CELL_H + GAP);
      const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.style.cursor = 'pointer';

      const isHit = searchHits.has(key);
      const pickNum = pickedMap.get(key);
      const isPicked = pickNum !== undefined;
      const isFocused = focusedPos === key;
      const isHovered = hoveredPos === key;
      const hasSearch = searchResults.length > 0;

      const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      bg.setAttribute('x', x); bg.setAttribute('y', y);
      bg.setAttribute('width', CELL_W); bg.setAttribute('height', CELL_H);
      bg.setAttribute('rx', RADIUS);

      if (cell.state === 'disabled') {
        bg.setAttribute('fill', 'url(#disabled-hatch)');
        bg.setAttribute('stroke', '#7f1d1d'); bg.setAttribute('stroke-width', '1.5');
      } else if (isPicked && isFocused) {
        bg.setAttribute('fill', '#2a1500');
        bg.setAttribute('stroke', '#ff6600'); bg.setAttribute('stroke-width', '3');
      } else if (isPicked) {
        bg.setAttribute('fill', '#1a0f00');
        bg.setAttribute('stroke', '#ff6600'); bg.setAttribute('stroke-width', '3');
      } else if (isFocused) {
        bg.setAttribute('fill', '#0f2847');
        bg.setAttribute('stroke', '#60a5fa'); bg.setAttribute('stroke-width', '2.5');
      } else if (isHovered) {
        bg.setAttribute('fill', '#1a0f00');
        bg.setAttribute('stroke', '#fb923c'); bg.setAttribute('stroke-width', '2.5');
      } else if (isHit) {
        bg.setAttribute('fill', '#1a0f00');
        bg.setAttribute('stroke', '#ff6600'); bg.setAttribute('stroke-width', '2');
        bg.setAttribute('stroke-dasharray', '4,2');
      } else if (cell.state === 'occupied') {
        bg.setAttribute('fill', hasSearch ? '#0a1628' : '#0f2847');
        bg.setAttribute('stroke', hasSearch ? '#1e293b' : (categoryColors[cell.category] || '#475569'));
        bg.setAttribute('stroke-width', hasSearch ? '1' : '2');
      } else {
        bg.setAttribute('fill', 'transparent');
        bg.setAttribute('stroke', '#334155'); bg.setAttribute('stroke-width', '1');
      }
      g.appendChild(bg);

      // Category strip
      if (cell.state === 'occupied' && cell.category) {
        const strip = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        strip.setAttribute('x', x + 3); strip.setAttribute('y', y + 3);
        strip.setAttribute('width', 4); strip.setAttribute('height', CELL_H - 6);
        strip.setAttribute('rx', 2);
        strip.setAttribute('fill', categoryColors[cell.category] || '#475569');
        if (hasSearch && !isHit && !isPicked && !isFocused && !isHovered) strip.setAttribute('opacity', '0.3');
        g.appendChild(strip);
      }

      // Pos label
      const pos = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      pos.setAttribute('x', x + 14); pos.setAttribute('y', y + 16);
      pos.setAttribute('fill', (isHit || isPicked || isFocused || isHovered) ? '#ff6600' : '#475569');
      pos.setAttribute('font-size', '10'); pos.setAttribute('font-family', 'inherit');
      pos.textContent = key; g.appendChild(pos);

      // Item name
      if (cell.item) {
        const it = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        it.setAttribute('x', x + 14); it.setAttribute('y', y + 38);
        const dim = hasSearch && !isHit && !isPicked && !isFocused && !isHovered;
        it.setAttribute('fill', dim ? '#475569' : '#e2e8f0');
        it.setAttribute('font-size', '11'); it.setAttribute('font-weight', '500');
        it.setAttribute('font-family', 'inherit');
        const maxC = 12;
        it.textContent = cell.item.length > maxC ? cell.item.slice(0, maxC) + '…' : cell.item;
        g.appendChild(it);
      }

      // Pick number badge (Google Maps style)
      if (isPicked) {
        const bs = 24;
        const bx = x + CELL_W - bs - 4, by = y + 4;
        const badge = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        badge.setAttribute('x', bx); badge.setAttribute('y', by);
        badge.setAttribute('width', bs); badge.setAttribute('height', bs);
        badge.setAttribute('rx', bs / 2); badge.setAttribute('fill', '#ff6600');
        g.appendChild(badge);
        const bt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        bt.setAttribute('x', bx + bs / 2); bt.setAttribute('y', by + bs / 2 + 5);
        bt.setAttribute('text-anchor', 'middle'); bt.setAttribute('fill', '#fff');
        bt.setAttribute('font-size', '12'); bt.setAttribute('font-weight', '700');
        bt.setAttribute('font-family', 'inherit');
        bt.textContent = pickNum; g.appendChild(bt);
      }

      // Search hit dot (not picked)
      if (isHit && !isPicked) {
        const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        dot.setAttribute('cx', x + CELL_W - 12); dot.setAttribute('cy', y + 12);
        dot.setAttribute('r', 5); dot.setAttribute('fill', '#ff6600'); dot.setAttribute('opacity', '0.8');
        g.appendChild(dot);
      }

      // Disabled
      if (cell.state === 'disabled') {
        const dt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        dt.setAttribute('x', x + CELL_W / 2); dt.setAttribute('y', y + CELL_H / 2 + 4);
        dt.setAttribute('text-anchor', 'middle'); dt.setAttribute('fill', '#991b1b');
        dt.setAttribute('font-size', '11'); dt.setAttribute('font-family', 'inherit');
        dt.textContent = 'DISABLED'; g.appendChild(dt);
      }

      // Tooltip
      g.addEventListener('mouseenter', (e) => {
        const tt = document.getElementById('tooltip');
        document.getElementById('ttLabel').textContent = currentGrid.module + ' ' + currentGrid.level + ' / ' + key;
        document.getElementById('ttItem').textContent = cell.item || (cell.state === 'disabled' ? 'Disabled' : 'Empty');
        document.getElementById('ttType').textContent = isPicked ? 'Pick #' + pickNum : (isHit ? 'Search result' : '');
        document.getElementById('ttParams').textContent = '';
        tt.style.display = 'block';
        tt.style.left = (e.clientX + 12) + 'px'; tt.style.top = (e.clientY + 12) + 'px';
      });
      g.addEventListener('mousemove', (e) => {
        const tt = document.getElementById('tooltip');
        tt.style.left = (e.clientX + 12) + 'px'; tt.style.top = (e.clientY + 12) + 'px';
      });
      g.addEventListener('mouseleave', () => { document.getElementById('tooltip').style.display = 'none'; });
      g.addEventListener('click', () => {
        const match = allItems.find(i => i.pos === key && i.module === currentGrid.module && i.level === currentGrid.level);
        if (match) focusResult(match.id);
      });

      svg.appendChild(g);
    }
  }
}

// === INIT ===
document.getElementById('searchInput').addEventListener('input', (e) => doSearch(e.target.value));

doSearch('M4');
// Pre-pick items across multiple locations, one with qty > 1
addToPick('muse-3-C1');  // M4x12 BHCS — MUSE Level 3
addToPick('muse-3-C6');  // M4x20 BHCS — MUSE Level 3
addToPick('muse-3-C6');  // tap + again to increment qty
addToPick('muse-7-A2');  // M4x16 BHCS — MUSE Level 7
addToPick('alex-2-A1');  // M4x25 SHCS — ALEX Drawer 2
renderPickList();
drawGrid();
</script>
