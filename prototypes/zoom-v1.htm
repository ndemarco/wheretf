<style>

  .search-row {

    padding: 8px 16px; background: #1e293b;
    border-bottom: 1px solid #334155; flex-shrink: 0;
  }
  .search-wrap {
    flex: 1; display: flex; align-items: center;
    background: #0f172a; border: 1px solid #334155;

  }
  .search-wrap:focus-within { border-color: #ff6600; }
  .search-wrap svg { width: 16px; height: 16px; color: #64748b; flex-shrink: 0; }
  .search-wrap input {

  }
  .search-wrap input::placeholder { color: #475569; }
  .search-count { font-size: 11px; color: #64748b; }

  .canvas-area {
    flex: 1; position: relative; overflow: hidden;
  }
  .canvas-area svg { width: 100%; height: 100%; }

  /* Module label on canvas */
  .module-label {
    font-weight: 700; fill: #94a3b8; font-family: inherit;
    pointer-events: none;
  }
  .level-label {
    font-weight: 500; fill: #64748b; font-family: inherit;
    pointer-events: none; font-size: 9px;
  }

  /* Legend */
  .legend {
    display: flex; gap: 16px; padding: 8px 16px;
    background: #1e293b; border-top: 1px solid #334155;
    font-size: 11px; color: #64748b; flex-shrink: 0;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch {
    width: 14px; height: 14px; border-radius: 3px; border: 1px solid #475569;
  }

  /* Tooltip */
  .tooltip {
    position: fixed; background: #1e293b; border: 1px solid #475569;
    border-radius: 8px; padding: 10px 14px; font-size: 12px;
    pointer-events: none; z-index: 100;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    max-width: 260px; display: none;
  }
  .tooltip .tt-label { font-weight: 600; color: #ff6600; margin-bottom: 4px; }
  .tooltip .tt-item { color: #e2e8f0; }
  .tooltip .tt-meta { color: #64748b; font-size: 11px; margin-top: 4px; }

  /* Zoom indicator */
  .zoom-indicator {
    position: absolute; bottom: 16px; right: 16px;
    background: #1e293b; border: 1px solid #334155;
    border-radius: 6px; padding: 6px 12px;
    font-size: 11px; color: #64748b;
  }
</style>

const rng = (seed) => { let s = seed; return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; }; };
const rand = rng(42);

for (const [modName, mod] of Object.entries(modules)) {
  for (const [lvl, lvlData] of Object.entries(mod.levels)) {
    for (let r = 0; r < lvlData.rows; r++) {
      for (let c = 0; c < lvlData.cols; c++) {
        const pos = rowLabels[r] + (c + 1);
        if (rand() < lvlData.fill) {
          const cat = categories[Math.floor(rand() * categories.length)];
          const name = sampleItems[Math.floor(rand() * sampleItems.length)];
          allItems.push({
            id: `${modName.toLowerCase()}-${lvl}-${pos}`,
            item: name, category: cat, module: modName,
            level: parseInt(lvl), pos: pos,
          });
        }
      }
    }
  }
}

// Build cell lookup
const cellMap = {};
for (const item of allItems) {
  const key = `${item.module}:${item.level}:${item.pos}`;
  cellMap[key] = item;
}

// === STATE ===
let searchQuery = '';
let searchResults = [];
let hoveredModule = null;
let hoveredLevel = null;
let focusedModule = null;
let focusedLevel = null;
let viewMode = 'overview'; // 'overview' or 'focused'
let animProgress = 1; // 0→1 for zoom transitions

// === LAYOUT ===
// Place modules on the canvas like semiconductor floorplan blocks.
// Each module occupies a region; levels are stacked vertically within.

const SVG_W = 1200, SVG_H = 800;
const PAD = 20;

// Module placement — manually arranged for visual interest
const moduleLayout = {
  MUSE: { x: PAD, y: PAD, w: 480, h: 380 },
  ALEX: { x: PAD, y: 420, w: 480, h: 360 },
  NEON: { x: 520, y: PAD, w: 320, h: 500 },
  AKRO: { x: 520, y: 520, w: 660, h: 260 },
};

// Within each module, levels are arranged as small rectangles
function getLevelRects(modName) {
  const mod = modules[modName];
  const layout = moduleLayout[modName];
  const levels = Object.keys(mod.levels);
  const n = levels.length;

  // Arrange levels in a grid within the module block
  const innerPad = 6;
  const labelH = 22;
  const innerW = layout.w - innerPad * 2;
  const innerH = layout.h - innerPad * 2 - labelH;

  // Determine grid: try to be roughly square
  let bestCols = 1, bestRows = n;
  let bestAspect = Infinity;
  for (let cols = 1; cols <= n; cols++) {
    const rows = Math.ceil(n / cols);
    const cellW = innerW / cols;
    const cellH = innerH / rows;
    const aspect = Math.abs(cellW / cellH - 1.5);
    if (aspect < bestAspect) {
      bestAspect = aspect;
      bestCols = cols;
      bestRows = rows;
    }
  }

  const cellW = innerW / bestCols;
  const cellH = innerH / bestRows;
  const gap = 3;
  const rects = {};

  for (let i = 0; i < n; i++) {
    const col = i % bestCols;
    const row = Math.floor(i / bestCols);
    rects[levels[i]] = {
      x: layout.x + innerPad + col * cellW + gap / 2,
      y: layout.y + innerPad + labelH + row * cellH + gap / 2,
      w: cellW - gap,
      h: cellH - gap,
    };
  }
  return rects;
}

// Precompute
const levelRects = {};
for (const modName of Object.keys(modules)) {
  levelRects[modName] = getLevelRects(modName);
}

// === SEARCH ===
function doSearch(query) {
  searchQuery = query;
  if (!query || query.length < 2) {
    searchResults = [];
    document.getElementById('searchCount').textContent = '';
    draw();
    return;
  }
  const q = query.toLowerCase();
  searchResults = allItems.filter(it =>
    it.item.toLowerCase().includes(q) ||
    it.category.toLowerCase().includes(q)
  );
  document.getElementById('searchCount').textContent =
    searchResults.length + ' result' + (searchResults.length !== 1 ? 's' : '') +
    ' across ' + new Set(searchResults.map(r => r.module)).size + ' modules';
  draw();
}

// === VIEW ===
function setView(mode) {
  viewMode = mode;
  document.getElementById('btnOverview').classList.toggle('active', mode === 'overview');
  document.getElementById('btnFocused').classList.toggle('active', mode === 'focused');
  draw();
  document.getElementById('zoomIndicator').textContent =
    mode === 'overview' ? 'Overview' : (focusedModule ? focusedModule + (focusedLevel ? ':' + focusedLevel : '') : 'Click a module');
}

// === DRAWING ===
function draw() {
  const svg = document.getElementById('mainSvg');
  svg.innerHTML = '';

  const ns = 'http://www.w3.org/2000/svg';

  // Build search hit map: module → level → Set of positions
  const hitMap = {};
  for (const r of searchResults) {
    if (!hitMap[r.module]) hitMap[r.module] = {};
    if (!hitMap[r.module][r.level]) hitMap[r.module][r.level] = new Set();
    hitMap[r.module][r.level].add(r.pos);
  }

  // Module hit counts for heat display
  const moduleHitCount = {};
  for (const r of searchResults) {
    moduleHitCount[r.module] = (moduleHitCount[r.module] || 0) + 1;
  }

  for (const [modName, mod] of Object.entries(modules)) {
    const layout = moduleLayout[modName];
    const hasHits = searchResults.length === 0 || moduleHitCount[modName] > 0;
    const isHovered = hoveredModule === modName;

    // Module block background
    const block = document.createElementNS(ns, 'rect');
    block.setAttribute('x', layout.x);
    block.setAttribute('y', layout.y);
    block.setAttribute('width', layout.w);
    block.setAttribute('height', layout.h);
    block.setAttribute('rx', 8);
    block.setAttribute('fill', searchResults.length > 0 && !hasHits ? '#0a0f1a' : '#141e33');
    block.setAttribute('stroke', isHovered ? mod.color : (hasHits && searchResults.length > 0 ? mod.color : '#1e293b'));
    block.setAttribute('stroke-width', isHovered ? '2.5' : '1.5');
    block.setAttribute('opacity', searchResults.length > 0 && !hasHits ? '0.4' : '1');
    svg.appendChild(block);

    // Module label
    const label = document.createElementNS(ns, 'text');
    label.setAttribute('x', layout.x + 10);
    label.setAttribute('y', layout.y + 17);
    label.setAttribute('font-size', '13');
    label.setAttribute('font-weight', '700');
    label.setAttribute('fill', hasHits ? mod.color : '#334155');
    label.setAttribute('font-family', 'inherit');
    label.textContent = modName;
    if (moduleHitCount[modName]) {
      label.textContent += ` (${moduleHitCount[modName]} hits)`;
    }
    svg.appendChild(label);

    // Level rectangles within module
    const rects = levelRects[modName];
    for (const [lvl, rect] of Object.entries(rects)) {
      const lvlInt = parseInt(lvl);
      const lvlData = mod.levels[lvl];
      const levelHits = hitMap[modName] && hitMap[modName][lvlInt] ? hitMap[modName][lvlInt] : new Set();
      const hasLevelHits = searchResults.length === 0 || levelHits.size > 0;
      const isLevelHovered = hoveredModule === modName && hoveredLevel === lvlInt;

      const g = document.createElementNS(ns, 'g');
      g.style.cursor = 'pointer';

      // Level background
      const bg = document.createElementNS(ns, 'rect');
      bg.setAttribute('x', rect.x);
      bg.setAttribute('y', rect.y);
      bg.setAttribute('width', rect.w);
      bg.setAttribute('height', rect.h);
      bg.setAttribute('rx', 3);

      if (searchResults.length > 0 && !hasLevelHits) {
        bg.setAttribute('fill', '#0a0f1a');
        bg.setAttribute('stroke', '#1e293b');
        bg.setAttribute('stroke-width', '0.5');
        bg.setAttribute('opacity', '0.3');
      } else if (isLevelHovered) {
        bg.setAttribute('fill', '#1a2744');
        bg.setAttribute('stroke', mod.color);
        bg.setAttribute('stroke-width', '2');
      } else {
        bg.setAttribute('fill', '#0f172a');
        bg.setAttribute('stroke', '#334155');
        bg.setAttribute('stroke-width', '1');
      }
      g.appendChild(bg);

      // Draw cells within level — miniature grid
      const cellGap = 1;
      const cellPad = 2;
      const availW = rect.w - cellPad * 2;
      const availH = rect.h - cellPad * 2 - 10; // 10 for level label
      const cellW = (availW - (lvlData.cols - 1) * cellGap) / lvlData.cols;
      const cellH = (availH - (lvlData.rows - 1) * cellGap) / lvlData.rows;

      for (let r = 0; r < lvlData.rows; r++) {
        for (let c = 0; c < lvlData.cols; c++) {
          const pos = rowLabels[r] + (c + 1);
          const cx = rect.x + cellPad + c * (cellW + cellGap);
          const cy = rect.y + cellPad + 10 + r * (cellH + cellGap);
          const cellKey = `${modName}:${lvlInt}:${pos}`;
          const item = cellMap[cellKey];
          const isSearchHit = levelHits.has(pos);

          const cell = document.createElementNS(ns, 'rect');
          cell.setAttribute('x', cx);
          cell.setAttribute('y', cy);
          cell.setAttribute('width', Math.max(cellW, 1));
          cell.setAttribute('height', Math.max(cellH, 1));
          cell.setAttribute('rx', 1);

          if (isSearchHit) {
            cell.setAttribute('fill', '#ff6600');
            cell.setAttribute('opacity', '0.9');
          } else if (item) {
            cell.setAttribute('fill', categoryColors[item.category] || '#475569');
            cell.setAttribute('opacity', searchResults.length > 0 ? '0.2' : '0.5');
          } else {
            cell.setAttribute('fill', '#1e293b');
            cell.setAttribute('opacity', searchResults.length > 0 && !hasLevelHits ? '0.1' : '0.3');
          }
          g.appendChild(cell);
        }
      }

      // Level label
      if (rect.h > 20) {
        const ll = document.createElementNS(ns, 'text');
        ll.setAttribute('x', rect.x + 4);
        ll.setAttribute('y', rect.y + 9);
        ll.setAttribute('font-size', '8');
        ll.setAttribute('fill', hasLevelHits ? '#94a3b8' : '#334155');
        ll.setAttribute('font-family', 'inherit');
        ll.textContent = 'L' + lvl;
        g.appendChild(ll);
      }

      // Hit count badge
      if (levelHits.size > 0) {
        const badgeR = 7;
        const bx = rect.x + rect.w - badgeR - 2;
        const by = rect.y + badgeR + 2;
        const badge = document.createElementNS(ns, 'circle');
        badge.setAttribute('cx', bx);
        badge.setAttribute('cy', by);
        badge.setAttribute('r', badgeR);
        badge.setAttribute('fill', '#ff6600');
        g.appendChild(badge);
        const bt = document.createElementNS(ns, 'text');
        bt.setAttribute('x', bx);
        bt.setAttribute('y', by + 3.5);
        bt.setAttribute('text-anchor', 'middle');
        bt.setAttribute('fill', '#fff');
        bt.setAttribute('font-size', '9');
        bt.setAttribute('font-weight', '700');
        bt.setAttribute('font-family', 'inherit');
        bt.textContent = levelHits.size;
        g.appendChild(bt);
      }

      // Interactions
      g.addEventListener('mouseenter', (e) => {
        hoveredModule = modName;
        hoveredLevel = lvlInt;
        draw();
        const tt = document.getElementById('tooltip');
        const totalCells = lvlData.rows * lvlData.cols;
        const occupied = allItems.filter(i => i.module === modName && i.level === lvlInt).length;
        document.getElementById('ttLabel').textContent = `${modName} / Level ${lvl}`;
        document.getElementById('ttItem').textContent =
          `${occupied}/${totalCells} occupied` +
          (levelHits.size > 0 ? ` — ${levelHits.size} search hit${levelHits.size > 1 ? 's' : ''}` : '');
        document.getElementById('ttMeta').textContent = `Grid: ${lvlData.rows}×${lvlData.cols}`;
        tt.style.display = 'block';
        tt.style.left = (e.clientX + 12) + 'px';
        tt.style.top = (e.clientY + 12) + 'px';
      });
      g.addEventListener('mousemove', (e) => {
        const tt = document.getElementById('tooltip');
        tt.style.left = (e.clientX + 12) + 'px';
        tt.style.top = (e.clientY + 12) + 'px';
      });
      g.addEventListener('mouseleave', () => {
        hoveredModule = null;
        hoveredLevel = null;
        draw();
        document.getElementById('tooltip').style.display = 'none';
      });
      g.addEventListener('click', () => {
        focusedModule = modName;
        focusedLevel = lvlInt;
        document.getElementById('zoomIndicator').textContent = modName + ':' + lvlInt;
      });

      svg.appendChild(g);
    }
  }

  // Wire-like connectors between modules (decorative, semiconductor-style)
  drawConnectors(svg, ns);
}

function drawConnectors(svg, ns) {
  // Draw subtle connection lines between module blocks — like chip interconnects
  const connections = [
    ['MUSE', 'NEON'],
    ['MUSE', 'ALEX'],
    ['NEON', 'AKRO'],
    ['ALEX', 'AKRO'],
  ];

  for (const [a, b] of connections) {
    const la = moduleLayout[a], lb = moduleLayout[b];
    const ax = la.x + la.w, ay = la.y + la.h / 2;
    const bx = lb.x, by = lb.y + lb.h / 2;

    // Determine connection points
    let x1, y1, x2, y2;
    if (ax <= bx) {
      // a is left of b
      x1 = ax; y1 = ay; x2 = bx; y2 = by;
    } else if (la.y + la.h <= lb.y) {
      // a is above b
      x1 = la.x + la.w / 2; y1 = la.y + la.h;
      x2 = lb.x + lb.w / 2; y2 = lb.y;
    } else {
      x1 = la.x + la.w / 2; y1 = la.y + la.h;
      x2 = lb.x + lb.w / 2; y2 = lb.y;
    }

    const line = document.createElementNS(ns, 'path');
    const mx = (x1 + x2) / 2;
    line.setAttribute('d', `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
    line.setAttribute('fill', 'none');
    line.setAttribute('stroke', '#1e293b');
    line.setAttribute('stroke-width', '1');
    line.setAttribute('stroke-dasharray', '4,4');
    svg.appendChild(line);
  }
}

// === INIT ===
document.getElementById('searchInput').addEventListener('input', (e) => doSearch(e.target.value));

draw();
</script>
